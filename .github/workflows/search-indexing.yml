name: Search Indexing Ping

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  ping-bing:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Bing with sitemap index
        run: |
          set -e
          SITEMAP_URL="https://indibargain.com/sitemap.xml"
          echo "Pinging Bing with ${SITEMAP_URL}"
          curl -sS "https://www.bing.com/ping?sitemap=${SITEMAP_URL}" -o bing-response.xml
          echo "Bing ping completed"
          head -n 20 bing-response.xml || true

  submit-search-console:
    runs-on: ubuntu-latest
    if: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON != '' && secrets.GSC_SITE_URL != '' }}
    steps:
      - name: Install Google API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-auth google-api-python-client

      - name: Submit sitemap index to Google Search Console API
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GSC_SITEMAP_URL: https://indibargain.com/sitemap.xml
        run: |
          python - <<'PY'
          import json
          import os
          from google.oauth2 import service_account
          from googleapiclient.discovery import build

          service_account_info = json.loads(os.environ["GSC_SERVICE_ACCOUNT_JSON"])
          site_url = os.environ["GSC_SITE_URL"]
          sitemap_url = os.environ["GSC_SITEMAP_URL"]

          credentials = service_account.Credentials.from_service_account_info(
              service_account_info,
              scopes=["https://www.googleapis.com/auth/webmasters"]
          )

          service = build("searchconsole", "v1", credentials=credentials)
          service.sitemaps().submit(siteUrl=site_url, feedpath=sitemap_url).execute()
          print(f"Submitted sitemap to Search Console: {sitemap_url} for {site_url}")
          PY

  search-console-not-configured:
    runs-on: ubuntu-latest
    if: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON == '' || secrets.GSC_SITE_URL == '' }}
    steps:
      - name: Explain missing Search Console secrets
        run: |
          echo "Search Console auto-submit skipped."
          echo "Set repository secrets GSC_SERVICE_ACCOUNT_JSON and GSC_SITE_URL to enable automatic sitemap submission."
